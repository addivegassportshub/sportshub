<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Stream & Score Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Versteckt die Scrollbars im Widget für eine sauberere Optik */
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-940 text-slate-100 p-2 text-xs sm:text-sm select-none">

    <!-- Mini-Header fürs Widget -->
    <div class="flex justify-between items-center border-b border-slate-800 pb-1.5 mb-2">
        <span class="font-bold text-emerald-400 tracking-wide uppercase text-[11px]">My Sport Hub</span>
        <span id="update-time" class="text-[10px] text-slate-500">Lade...</span>
    </div>

    <!-- Container für die Spiele -->
    <div id="games-container" class="space-y-1.5">
        <div class="text-center text-slate-500 py-4">Suche nach Live-Events...</div>
    </div>

    <script>
        // IPTV Deep-Links & Stream-Plattformen
        const iptvLinks = {
            "RTL": "intent://#Intent;scheme=iptv;package=com.itv.android.iptv;S.channel_id=RTL;end",
            "RTL+": "https://plus.rtl.de",
            "ProSieben": "intent://#Intent;scheme=iptv;package=com.itv.android.iptv;S.channel_id=Pro7;end",
            "ProSieben MAXX": "intent://#Intent;scheme=iptv;package=com.itv.android.iptv;S.channel_id=ProSiebenMAXX;end",
            "MagentaSport": "https://www.magentasport.de",
            "Sportdeutschland.TV": "https://sportdeutschland.tv",
            "DF1": "intent://#Intent;scheme=iptv;package=com.itv.android.iptv;S.channel_id=DF1;end",
            "DAZN": "dazn://" 
        };

        // Zeitfenster festlegen (vor 48 Stunden bis in 7 Tage)
        const now = new Date();
        const past48Hours = new Date(now.getTime() - (48 * 60 * 60 * 1000));
        const future7Days = new Date(now.getTime() + (7 * 24 * 60 * 60 * 1000));

        // DATENQUELLE 1: Manuelle Termine (GFL-Konferenz am Sonntag)
        const localFootballGames = [
            {
                dateObj: new Date("2026-05-24T15:00:00"), 
                sport: "GFL Football",
                matchName: "GFL Konferenz (u.a. Unicorns @ Royals)",
                score: "- : -",
                live: false,
                statusText: "So. 24. Mai - 15:00",
                plattform: "DF1 / Sportdeutschland.TV",
                link: iptvLinks["DF1"]
            }
        ];

        async function fetchScores() {
            const container = document.getElementById('games-container');
            const updateTimeSpan = document.getElementById('update-time');
            const proxy = "https://api.allorigins.win/raw?url=";
            
            let gamesFound = [];

            // 1. GFL Konferenz hinzufügen
            localFootballGames.forEach(game => {
                if (game.dateObj >= past48Hours && game.dateObj <= future7Days) {
                    gamesFound.push(game);
                }
            });

            // 2. API-Abruf von ESPN (NFL)
            try {
                const nflUrl = proxy + encodeURIComponent("https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard");
                const response = await fetch(nflUrl);
                if (response.ok) {
                    const data = await response.json();
                    if (data.events) {
                        data.events.forEach(event => {
                            const gameDate = new Date(event.date);
                            if (gameDate >= past48Hours && gameDate <= future7Days) {
                                const status = event.status.type.state;
                                gamesFound.push({
                                    dateObj: gameDate,
                                    sport: "NFL Football",
                                    matchName: `${event.competitions[0].competitors[1].team.displayName} @ ${event.competitions[0].competitors[0].team.displayName}`,
                                    score: `${event.competitions[0].competitors[1].score} - ${event.competitions[0].competitors[0].score}`,
                                    live: status === "in",
                                    statusText: event.status.type.detail,
                                    plattform: "RTL+ / DAZN",
                                    link: iptvLinks["RTL+"]
                                });
                            }
                        });
                    }
                }
            } catch (e) { console.warn("NFL API schläft."); }

            // 3. API-Abruf von TheSportsDB (Eishockey WM)
            // Wir fragen die Events der Internationalen Eishockey-Liga/WM ab (In TheSportsDB oft Liga-ID für IIHF)
            try {
                // Freier API-Pfad von TheSportsDB für Live/aktuelle Events
                const sportsDbUrl = proxy + encodeURIComponent("https://www.thesportsdb.com/api/v1/json/1/eventsday.php?d=" + now.toISOString().split('T')[0]);
                const response = await fetch(sportsDbUrl);
                if (response.ok) {
                    const data = await response.json();
                    if (data.events) {
                        data.events.forEach(event => {
                            // Wir filtern gezielt nach Eishockey (Ice Hockey) oder dem Begriff "World Championship" / "IIHF"
                            if (event.strSport === "Ice Hockey" || event.strLeague.includes("World Championship")) {
                                const gameDate = new Date(event.strTimestamp || event.dateEvent + "T" + event.strTime);
                                
                                // Deutsche Sender-Zuweisungslogik für die WM
                                let plattform = "MagentaSport";
                                let link = iptvLinks["MagentaSport"];
                                if (event.strEvent.includes("Germany") || event.strEvent.includes("Deutschland")) {
                                    plattform = "ProSieben / MagentaSport";
                                    link = iptvLinks["ProSieben"];
                                }

                                gamesFound.push({
                                    dateObj: gameDate,
                                    sport: "Eishockey WM",
                                    matchName: `${event.strEventAlternate || event.strEvent}`,
                                    score: `${event.intHomeScore || 0} - ${event.intAwayScore || 0}`,
                                    live: event.strStatus === "讀" || event.strProgress > 0, // "In Progress" Erkennung
                                    statusText: event.strStatus === "Match Finished" ? "Final" : (event.strTime ? event.strTime.substring(0,5) + " Uhr" : "Heute"),
                                    plattform: plattform,
                                    link: link
                                });
                            }
                        });
                    }
                }
            } catch (e) { console.warn("TheSportsDB API Fehler."); }

            // Alle Spiele chronologisch sortieren
            gamesFound.sort((a, b) => a.dateObj - b.dateObj);

            // In das Widget rendern
            if (gamesFound.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-500 py-6">Keine Live-Events oder anstehenden Spiele (WM / GFL) im Zeitfenster gefunden.</div>';
            } else {
                container.innerHTML = gamesFound.map(game => `
                    <div class="bg-slate-900 border ${game.live ? 'border-emerald-500/40' : 'border-slate-800'} rounded-lg p-2 flex items-center justify-between gap-2">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-1.5 mb-0.5">
                                <span class="text-[9px] uppercase font-bold tracking-wider px-1 rounded ${game.live ? 'bg-emerald-500/10 text-emerald-400' : 'bg-slate-800 text-slate-400'}">
                                    ${game.live ? '● LIVE' : game.sport}
                                </span>
                                <span class="text-[10px] text-slate-400 truncate">${game.statusText}</span>
                            </div>
                            <h3 class="font-medium text-slate-200 truncate">${game.matchName}</h3>
                        </div>
                        
                        <div class="flex items-center gap-3">
                            <div class="text-right">
                                <span class="font-bold text-slate-100 block text-xs sm:text-sm tracking-wider">${game.live || game.statusText.includes("Final") ? game.score : 'vs'}</span>
                                <span class="text-[10px] text-slate-500 block">${game.plattform}</span>
                            </div>
                            <a href="${game.link}" class="bg-slate-800 hover:bg-emerald-500 hover:text-slate-950 p-1.5 rounded transition text-center text-[11px] font-bold text-slate-300">
                                📺
                            </a>
                        </div>
                    </div>
                `).join('');
            }

            const nowUpdate = new Date();
            updateTimeSpan.innerText = `Prüfung: ${nowUpdate.toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'})}`;
        }

        fetchScores();
        setInterval(fetchScores, 60000);
    </script>
</body>
</html>
