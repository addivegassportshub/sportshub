<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Stream & Score Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Versteckt die Scrollbars im Widget für eine sauberere Optik */
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-940 text-slate-100 p-2 text-xs sm:text-sm select-none">

    <!-- Mini-Header fürs Widget -->
    <div class="flex justify-between items-center border-b border-slate-800 pb-1.5 mb-2">
        <span class="font-bold text-emerald-400 tracking-wide uppercase text-[11px]">My Sport Hub</span>
        <span id="update-time" class="text-[10px] text-slate-500">Lade...</span>
    </div>

    <!-- Container für die Spiele -->
    <div id="games-container" class="space-y-1.5">
        <div class="text-center text-slate-500 py-4">Suche nach Live-Events...</div>
    </div>

    <script>
        // IPTV Deep-Links & Stream-Plattformen
        const iptvLinks = {
            "RTL": "intent://#Intent;scheme=iptv;package=com.itv.android.iptv;S.channel_id=RTL;end",
            "RTL+": "https://plus.rtl.de",
            "ProSieben": "intent://#Intent;scheme=iptv;package=com.itv.android.iptv;S.channel_id=Pro7;end",
            "ProSieben MAXX": "intent://#Intent;scheme=iptv;package=com.itv.android.iptv;S.channel_id=ProSiebenMAXX;end",
            "MagentaSport": "https://www.magentasport.de",
            "Sportdeutschland.TV": "https://sportdeutschland.tv",
            "DAZN": "dazn://" 
        };

        // Zeitfenster festlegen (vor 48 Stunden bis in 7 Tage)
        const now = new Date();
        const past48Hours = new Date(now.getTime() - (48 * 60 * 60 * 1000));
        const future7Days = new Date(now.getTime() + (7 * 24 * 60 * 60 * 1000));

        // DATENQUELLE 1: Manuelle Termine für GFL / ELF
        const localFootballGames = [
            {
                dateObj: new Date("2026-05-24T15:00:00"), 
                sport: "GFL Football",
                matchName: "Schwäbisch Hall Unicorns @ Potsdam Royals",
                score: "- : -",
                live: false,
                statusText: "24. Mai - 15:00",
                plattform: "Sportdeutschland.TV",
                link: iptvLinks["Sportdeutschland.TV"]
            },
            {
                dateObj: new Date("2026-05-31T16:25:00"),
                sport: "ELF Football",
                matchName: "Rhein Fire @ Frankfurt Galaxy",
                score: "- : -",
                live: false,
                statusText: "31. Mai - 16:25",
                plattform: "ProSieben MAXX / Joyn",
                link: iptvLinks["ProSieben MAXX"]
            }
        ];

        async function fetchScores() {
            const container = document.getElementById('games-container');
            const updateTimeSpan = document.getElementById('update-time');
            
            // Zuverlässiger, alternativer CORS-Proxy falls AllOrigins blockiert
            const proxy = "https://api.allorigins.win/raw?url=";
            
            const apis = [
                { name: "NFL Football", url: proxy + encodeURIComponent("https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard"), plattform: "RTL+ / DAZN" },
                { name: "Eishockey WM", url: proxy + encodeURIComponent("https://site.api.espn.com/apis/site/v2/sports/hockey/mens-world-championship/scoreboard"), plattform: "MagentaSport / ProSieben" }
            ];

            let gamesFound = [];

            // 1. Lokale Spiele hinzufügen (Fehlerfrei, da kein API-Abruf nötig)
            localFootballGames.forEach(game => {
                if (game.dateObj >= past48Hours && game.dateObj <= future7Days) {
                    gamesFound.push(game);
                }
            });

            // 2. API-Spiele abrufen (Jetzt einzeln abgesichert mit try-catch!)
            for (const api of apis) {
                try {
                    const response = await fetch(api.url);
                    if (!response.ok) continue; // Falls diese eine API zickt, weiter zur nächsten
                    const data = await response.json();
                    
                    if (data.events) {
                        data.events.forEach(event => {
                            const gameDate = new Date(event.date);
                            
                            if (gameDate >= past48Hours && gameDate <= future7Days) {
                                const status = event.status.type.state;
                                const statusText = event.status.type.detail;
                                const homeTeam = event.competitions[0].competitors[0];
                                const awayTeam = event.competitions[0].competitors[1];
                                
                                gamesFound.push({
                                    dateObj: gameDate,
                                    sport: api.name,
                                    matchName: `${awayTeam.team.displayName} @ ${homeTeam.team.displayName}`,
                                    score: `${awayTeam.score} - ${homeTeam.score}`,
                                    live: status === "in",
                                    statusText: statusText,
                                    plattform: api.plattform,
                                    link: iptvLinks[api.plattform.split(' / ')[0]] || "#"
                                });
                            }
                        });
                    }
                } catch (e) { 
                    // Loggt den Fehler nur intern in der Konsole, blockiert aber nicht das Widget!
                    console.warn(`API-Abruf fehlgeschlagen für: ${api.name}`); 
                }
            }

            // Alle gefundenen Spiele chronologisch sortieren
            gamesFound.sort((a, b) => a.dateObj - b.dateObj);

            // Ansicht rendern
            if (gamesFound.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-500 py-6">Keine Spiele (Football / WM) im aktuellen Zeitraum (vor 48h bis +7 Tage) gefunden.</div>';
            } else {
                container.innerHTML = gamesFound.map(game => `
                    <div class="bg-slate-900 border ${game.live ? 'border-emerald-500/40' : 'border-slate-800'} rounded-lg p-2 flex items-center justify-between gap-2">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-1.5 mb-0.5">
                                <span class="text-[9px] uppercase font-bold tracking-wider px-1 rounded ${game.live ? 'bg-emerald-500/10 text-emerald-400' : 'bg-slate-800 text-slate-400'}">
                                    ${game.live ? '● LIVE' : game.sport}
                                </span>
                                <span class="text-[10px] text-slate-400 truncate">${game.statusText}</span>
                            </div>
                            <h3 class="font-medium text-slate-200 truncate">${game.matchName}</h3>
                        </div>
                        
                        <div class="flex items-center gap-3">
                            <div class="text-right">
                                <span class="font-bold text-slate-100 block text-xs sm:text-sm tracking-wider">${game.live || game.statusText.includes("Final") ? game.score : 'vs'}</span>
                                <span class="text-[10px] text-slate-500 block">${game.plattform}</span>
                            </div>
                            <a href="${game.link}" class="bg-slate-800 hover:bg-emerald-500 hover:text-slate-950 p-1.5 rounded transition text-center text-[11px] font-bold text-slate-300">
                                📺
                            </a>
                        </div>
                    </div>
                `).join('');
            }

            const nowUpdate = new Date();
            updateTimeSpan.innerText = `Prüfung: ${nowUpdate.toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'})}`;
        }

        fetchScores();
        setInterval(fetchScores, 60000);
    </script>
</body>
</html>
